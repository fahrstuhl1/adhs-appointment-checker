name: ADHS Appointment Checker
version: "0.1.0"
slug: adhs_appointment_checker
description: >-
  Periodically checks samedi.de for available ADHS appointment slots, with a web
  UI to configure doctors/intervals and view the last result.
url: https://github.com/fahrstuhl1/adhs-appointment-checker
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
panel_icon: mdi:calendar-clock
panel_title: ADHS Checker
hassio_api: true
homeassistant_api: true
map:
  - addon_config:rw
options:
  log_level: info
  default_interval_minutes: 60
  base_url: https://patient.samedi.de/api/booking/v3
  notify_service: persistent_notification
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  default_interval_minutes: int(5,1440)
  base_url: str
  notify_service: str
